<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金梦湾渔业水质在线监测平台</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="top-meta"><span>当前时间</span><strong data-current-time></strong></div>
      <div class="brand">金梦湾渔业水质在线监测平台</div>
      <div class="top-meta right"><span class="status-dot"></span><span>系统状态</span><strong data-system-status></strong></div>
    </header>
    <nav class="nav">
      <a href="index.html" data-page="dashboard">首页总览</a>
      <a href="device.html" data-page="device">设备管理</a>
      <a href="analysis.html" data-page="analysis">水质分析</a>
      <a href="alarm.html" data-page="alarm">报警记录</a>
      <a href="settings.html" data-page="settings">参数设置</a>
    </nav>
    <main class="grid-analysis">
      <section class="panel">
        <h2 class="panel-title">分析条件</h2>
        <div class="toolbar">
          <label class="field">指标<select id="metricSelect"></select></label>
          <label class="field">时间范围<select id="rangeSelect"></select></label>
        </div>
      </section>
      <section class="panel">
        <h2 class="panel-title">历史曲线</h2>
        <div class="chart" id="analysisChart"></div>
      </section>
      <section class="panel">
        <h2 class="panel-title">历史数据表</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>时间</th><th>指标</th><th>数值</th><th>单位</th><th>状态</th></tr></thead>
            <tbody id="analysisTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="assets/js/mock-data.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/analysis.js"></script>
</body>
</html>
