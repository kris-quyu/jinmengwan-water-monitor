<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金梦湾渔业水质在线监测平台</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="top-meta"><span>当前时间</span><strong data-current-time></strong></div>
      <div class="brand">金梦湾渔业水质在线监测平台</div>
      <div class="top-meta right"><span class="status-dot"></span><span>系统状态</span><strong data-system-status></strong></div>
    </header>
    <nav class="nav">
      <a href="index.html" data-page="dashboard">首页总览</a>
      <a href="device.html" data-page="device">设备管理</a>
      <a href="analysis.html" data-page="analysis">水质分析</a>
      <a href="alarm.html" data-page="alarm">报警记录</a>
      <a href="settings.html" data-page="settings">参数设置</a>
    </nav>
    <main class="grid-device">
      <section class="panel">
        <h2 class="panel-title">传感器列表</h2>
        <div class="sensor-list" id="sensorList"></div>
      </section>
      <section class="panel">
        <h2 class="panel-title">传感器趋势</h2>
        <div class="chart-grid" id="sensorCharts"></div>
      </section>
      <section class="panel">
        <h2 class="panel-title">实时传感器数值</h2>
        <div class="stat-list" id="sensorValues"></div>
      </section>
      <section class="panel" style="grid-column: 1 / -1;">
        <h2 class="panel-title">操作记录与异常记录</h2>
        <div class="record-columns">
          <div id="operationRecords"></div>
          <div id="exceptionRecords"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="assets/js/mock-data.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/device.js"></script>
</body>
</html>
